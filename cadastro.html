<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PontoSync - Criar Conta</title>
    <link rel="icon" href="./imgs/clock.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>

    <main class="register-container">
        <div class="register-logo">
            <i class="fa-solid fa-clock logo-icon"></i>
            <span class="logo-text">PontoSync</span>
        </div>

        <div class="register-card">
            <h1 class="card-title">Criar conta</h1>
            <p class="card-subtitle">Preencha os dados para se cadastrar</p>

            <form class="register-form">
                <div class="form-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" placeholder="Seu nome completo" required>
                </div>
                
                <div class="form-row">
            <div class="form-group">
                    <label for="cpf">CPF</label>
                    <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="11" oninput="mascaraCPF(this)" required>
            </div>

            <div class="form-group">
                    <label for="nascimento">Data de Nascimento</label>
                    <input type="date" id="nascimento" required>
            </div>
</div>

                <div class="form-row">
            <div class="form-group">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" placeholder="(00) 00000-0000" maxlength="15" oninput="mascaraTelefone(this)" required>
                </div>

            <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
                </div>

                <div class="form-group">
                    <label for="senha">Criar Senha</label>
                    <input type="password" id="senha" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary">Cadastrar</button>
            </form>

            <div class="card-footer">
                <a href="login.html" class="footer-link">Já tem conta? Entrar</a>
            </div>
        </div>
    </main>

</body>
</html>
