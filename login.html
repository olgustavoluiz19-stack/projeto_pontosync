<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PontoSync - Entrar</title>
    <link rel="icon" href="./imgs/clock.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="login.css">
</head>
<body>

    <main class="login-container">
        <div class="login-logo">
            <i class="fa-solid fa-clock logo-icon"></i>
            <span class="logo-text">PontoSync</span>
        </div>

        <div class="login-card">
            <h1 class="card-title">Entrar</h1>
            <p class="card-subtitle">Acesse o sistema de controle de ponto</p>

            <form class="login-form" id="formLogin">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-primary">Entrar</button>
            </form>

            <div class="card-footer">
                <a href="#" class="footer-link">Esqueci minha senha</a>
                <a href="cadastro.html" class="footer-link highlight">Não tem conta? Cadastre-se</a>
            </div>
        </div>
    </main>

    <script src="login.js"></script>
</body>
</html>
