<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PontoSync - Registros</title>
    <link rel="icon" href="imgs/clock.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="registros.css">
</head>
<body>

    <div class="wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-clock logo-icon"></i>
                <span class="logo-text">PontoSync</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
                <a href="funcionarios.html" class="nav-link"><i class="fa-solid fa-users"></i> Funcionários</a>
                <a href="equipes.html" class="nav-link"><i class="fa-solid fa-user-group"></i> Equipes</a>
                <a href="registros.html" class="nav-link active"><i class="fa-solid fa-address-book"></i> Registros</a>
                <a href="relatorios.html" class="nav-link"><i class="fa-solid fa-chart-line"></i> Relatórios</a>
            </nav>
            <div class="sidebar-footer">
                <a href="login.html" class="nav-link logout"><i class="fa-solid fa-right-from-bracket"></i> Sair</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h1 class="page-title">Registros</h1>
            </header>

            <section class="content-body">
                <div class="filter-bar">
                    <div class="filter-group">
                        <i class="fa-solid fa-filter filter-icon-main"></i>
                        <input type="date" id="filter-date" class="input-filter">
                        <select id="filter-worker" class="input-filter">
                            <option value="todos">Todos</option>
                        </select>
                    </div>
                    <button class="btn-primary" onclick="abrirModalRegistro()">
                        <i class="fa-solid fa-plus"></i> Novo Registro
                    </button>
                </div>

                <div class="table-container">
                    <table class="records-table">
                        <thead>
                            <tr>
                                <th>Funcionário</th>
                                <th>Tipo</th>
                                <th>Data/Hora</th>
                                <th>Observação</th>
                                <th class="text-right">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-registros">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="modal-registro" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Novo Registro</h2>
                <button class="close-modal" onclick="fecharModalRegistro()">&times;</button>
            </div>
            <form id="form-registro" class="modal-body">
                <div class="form-group full-width">
                    <label>Funcionário *</label>
                    <select id="reg-worker" required>
                        <option value="" disabled selected>Selecione</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Tipo *</label>
                        <select id="reg-type" required>
                            <option value="Entrada">Entrada</option>
                            <option value="Saída">Saída</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Data/Hora *</label>
                        <input type="datetime-local" id="reg-datetime" required>
                    </div>
                </div>

                <div class="form-group full-width">
                    <label>Observação</label>
                    <input type="text" id="reg-obs" placeholder="Opcional">
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-cancelar" onclick="fecharModalRegistro()">Cancelar</button>
                    <button type="submit" class="btn-salvar">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="registros.js"></script>
</body>
</html>
