<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PontoSync - Relatórios</title>
    <link rel="icon" href="./imgs/clock.png" type="image/png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="relatorios.css">
</head>
<body>

    <div class="wrapper">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-clock logo-icon"></i>
                <span class="logo-text">PontoSync</span>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-link"><i class="fa-solid fa-table-columns"></i> Dashboard</a>
                <a href="funcionarios.html" class="nav-link"><i class="fa-solid fa-users"></i> Funcionários</a>
                <a href="equipes.html" class="nav-link"><i class="fa-solid fa-user-group"></i> Equipes</a>
                <a href="registros.html" class="nav-link"><i class="fa-solid fa-address-book"></i> Registros</a>
                <a href="#" class="nav-link active"><i class="fa-solid fa-chart-line"></i> Relatórios</a>
            </nav>
            <div class="sidebar-footer">
                <a href="login.html" class="nav-link logout"><i class="fa-solid fa-right-from-bracket"></i> Sair</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header">
                <h1 class="page-title">Relatórios</h1>
            </header>

            <section class="content-body">
                <div class="report-filters">
                    <div class="filter-group">
                        <label>Data Início</label>
                        <input type="date" id="date-start" value="2026-04-01">
                    </div>
                    <div class="filter-group">
                        <label>Data Fim</label>
                        <input type="date" id="date-end" value="2026-04-10">
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon-box blue"><i class="fa-solid fa-users"></i></div>
                        <div class="stat-info">
                            <span class="label">Funcionários</span>
                            <h3 id="count-workers">2</h3>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon-box green"><i class="fa-regular fa-clock"></i></div>
                        <div class="stat-info">
                            <span class="label">Total de Horas</span>
                            <h3>0.0h</h3>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon-box green-dark"><i class="fa-solid fa-list-check"></i></div>
                        <div class="stat-info">
                            <span class="label">Registros</span>
                            <h3 id="count-records">2</h3>
                        </div>
                    </div>
                </div>

                <div class="chart-container">
                    <h3>Horas Trabalhadas por Funcionário</h3>
                    <div class="canvas-wrapper">
                        <canvas id="hoursChart"></canvas>
                    </div>
                </div>

                <div class="table-container">
                    <table class="report-table">
                        <thead>
                            <tr>
                                <th>Funcionário</th>
                                <th>Horas Trabalhadas</th>
                                <th>Entradas</th>
                                <th>Saídas</th>
                            </tr>
                        </thead>
                        <tbody id="table-report-body">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="relatorios.js"></script>
</body>
</html>
